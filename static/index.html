<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Departures</title>
    <link rel="stylesheet" href="style.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h1 id="stopname"></h1>

<div class="controls">
	<form method="GET" class="controls-form">
		
		<div class="field-group">
			<div class="autocomplete">
				<input
					type="text"
					name="stop"
					id="stop"
					placeholder="Search Stop..."
					autocomplete="off"
				>
				<div id="stop-results" class="autocomplete-results"></div>
			</div>
		</div>

		<div class="field-inline">
			<label>
				<input type="checkbox" name="show-terminal" checked>
				<span>Show terminal trips</span>
			</label>
		</div>

		<div class="actions">
			<input type="submit" value="Load">
		</div>

	</form>
</div>

    <h2>Vehicles</h2>
	<table>
		<thead>
			<tr>
				<th style="width:20px;"></th>
				<th style="width:20px;"></th>
				<th>Destination</th>
				<th>Scheduled</th>
				<th>Delay</th>
				<th>Vehicle</th>
			</tr>
		</thead>
		<tbody id="buffer"></tbody>
    </table>

    <h2>Departures</h2>
	<table>
		<thead>
			<tr>
				<th style="width:20px;"></th>
				<th style="width:20px;"></th>
				<th>Destination</th>
				<th>Scheduled</th>
				<th>Delay</th>
				<th>Vehicle</th>
			</tr>
		</thead>
		<tbody id="rows"></tbody>
	</table>

<script type="text/javascript" src="main.js"></script>
<footer class="footer">
	&copy; 2026 Friedel Schön &mdash;
	Source hosted at
	<a href="https://github.com/friedelschoen/departures" target="_blank">
		GitHub
	</a>
</footer>
</body>
</html>
