services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: departures
      POSTGRES_USER: departures
      POSTGRES_PASSWORD: pw123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U departures -d departures"]
      interval: 1s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    restart: unless-stopped

    ports:
      - "8082:8080"

  static_server:
    image: nginx:alpine
    restart: unless-stopped

    depends_on:
      - api_server

    ports:
      - "8081:80"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro

  kv6_updater:
    build: kv6_updater

    depends_on:
      postgres: 
        condition: service_healthy

    environment:
      POSTGRES: postgresql://departures:pw123@postgres:5432/departures
      PGSSLMODE: disable

  gtfs_updater:
    build: gtfs_updater

    depends_on:
      postgres: 
        condition: service_healthy
      static_server:
        condition: service_started

    environment:
      POSTGRES: postgresql://departures:pw123@postgres:5432/departures
      PGSSLMODE: disable
      GTFS_URL: http://static_server/gtfs-nl.zip
      #GTFS_URL: https://gtfs.openov.nl/gtfs-rt/gtfs-openov-nl.zip

  api_server:
    build: api_server

    depends_on:
      postgres: 
        condition: service_healthy

    environment:
      POSTGRES: postgresql://departures:pw123@postgres/departures
      PGSSLMODE: disable

volumes:
  postgres_data:
