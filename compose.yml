services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: "1gb"

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro 
      - ./db_init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U departures -d departures"]
      interval: 1s
      timeout: 5s
      retries: 10

    ports:
      - "5432:5432"

  static_server:
    build: frontend
    restart: unless-stopped
    depends_on:
      - api_server
    ports:
      - "6680:80"

  realtime_ingest:
    build: realtime_ingest
    restart: unless-stopped

    depends_on:
      postgres: 
        condition: service_healthy

    environment:
      BISON_MQ: ${BISON_MQ}
      POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGSSLMODE: disable
  
  kv6_projector:
    build: kv6_projector
    restart: unless-stopped

    depends_on:
      postgres: 
        condition: service_healthy

    environment:
      POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGSSLMODE: disable

  api_server:
    build: api_server
    restart: unless-stopped

    depends_on:
      postgres: 
        condition: service_healthy

    environment:
      SOURCE_REPO: ${SOURCE_REPO}
      POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGSSLMODE: disable

volumes:
  postgres_data:
