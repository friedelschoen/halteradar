<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Departures</title>
	<style>
		body {
			font-family: sans-serif;
			max-width: 1100px;
			margin: 2rem auto;
			padding: 0 1rem;
		}
		table {
			width: 100%;
			border-collapse: collapse;
		}
		th, td {
			padding: .5rem;
			border-bottom: 1px solid #ddd;
			text-align: left;
		}
		.delay {
			color: #b00020;
			font-weight: bold;
		}
		.cancelled {
			text-decoration: line-through;
			color: #777;
		}
        .date-row {
            background-color: #eee;
            text-align: center;
            font-weight: bold;
        }
        .terminal {
            font-style: italic;
            color: #777;
        }
	</style>
</head>
<body>
    <h1>Departures for <span id="stopname">{{.StopID}}</span></h1>

	<p>
		Stop ID:
		<input id="stop" value="{{.StopID}}">
		<button onclick="load()">Load</button>
	</p>

	<table>
		<thead>
			<tr>
				<th>Line</th>
				<th>Platform</th>
				<th>Destination</th>
				<th>Block Code</th>
				<th>Scheduled</th>
				<th>Delay</th>
				<th>Vehicle</th>
			</tr>
		</thead>
		<tbody id="rows"></tbody>
	</table>

<script>
async function load() {
	const stop = document.getElementById("stop").value;
	const res = await fetch("/api/departures?stop=" + encodeURIComponent(stop));
	const stopinfo = await res.json();
    const deps = stopinfo.departures;

	const stopname = document.getElementById("stopname");
	stopname.innerHTML = stopinfo.name;

    const rows = document.getElementById("rows");
	rows.innerHTML = "";

    let prev_date = "";

	for (const d of deps) {
        if (d.date != prev_date) {    
            prev_date = d.date;
    		const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="7" class="date-row">${prev_date}</td>`;
		    rows.appendChild(tr);
        }

		const tr = document.createElement("tr");
		if (d.cancelled) tr.classList.add("cancelled");
        if (d.terminal) tr.classList.add("terminal");

        let vehicle = "";
		if (d.vehicle) {
			const id = d.vehicle.id;
			const lat = d.vehicle.lat.toFixed(5);
			const lon = d.vehicle.lon.toFixed(5);
			vehicle = `<a target=\"_blank\" href=\"https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=16/${lat}/${lon}\">${id}</a>`;
		}

        const delay = d.delay_minutes >= 0 ? "+" + d.delay_minutes : d.delay_minutes;

        const time = d.scheduled_time == d.realtime_time ? `<b>${d.scheduled_time}</b>` : `<s>${esc(d.scheduled_time)}</s> <b>${esc(d.realtime_time)}</b>`;

		tr.innerHTML = `
			<td>${esc(d.line)}</td>
			<td>${esc(d.platform)}</td>
            <td>${esc(d.headsign)}</td>
            <td>${esc(d.blockcode)}</td>
			<td>${time}</td>
			<td class="${d.delay_minutes > 0 ? "delay" : ""}">
				${d.cancelled ? "cancelled" : (d.vehicle || d.delay_minutes != 0 ? delay + " min" : "")}
			</td>
			<td>${vehicle}</td>
		`;

		rows.appendChild(tr);
	}
}

function esc(s) {
	return String(s ?? "").replace(/[&<>"']/g, c => ({
		"&": "&amp;",
		"<": "&lt;",
		">": "&gt;",
		'"': "&quot;",
		"'": "&#39;"
	}[c]));
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
